<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>

    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
      }

      header {
        position: absolute;
        width: 100%;
        left: 0;
        top: 0;
        z-index: 1000;
      }

      .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1320px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .top-bar {
        background: linear-gradient(214.38deg, #ff8079 -2.24%, #ff1e1e 59.38%);
        padding: 10px 0;
      }

      .top-bar-content {
        display: flex;
        gap: 30px;
      }

      .sal-animate {
        text-decoration: none;
        color: white;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.2s ease;
      }

      .sal-animate:hover {
        opacity: 0.85;
      }

      .sal-animate img {
        display: block;
        max-height: 16px;
      }

      nav {
        padding: 20px 0;
        background: transparent;
        width: 100%;
      }

      ul {
        display: flex;
        align-items: center;
        gap: 30px;
        list-style: none;
      }

      ul li a.nav-link {
        color: #1f1e1e;
        font-size: 18px;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      ul li a.nav-link:hover {
        color: #ff1e1e;
      }

      .btn-browse {
        color: #fff;
        background: linear-gradient(214.38deg, #ff8079 -2.24%, #ff1e1e 59.38%);
        border-radius: 10px;
        text-align: center;
        padding: 13px 24px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: opacity 0.3s ease;
      }

      .btn-browse:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <header>
      <section class="top-bar">
        <div class="container">
          <div class="top-bar-content">
            <a href="tel:01777308777" class="sal-animate">
              <img
                src="https://www.creativeitinstitute.com/assets/images/home/call.png"
                alt="phone icon"
              />
              01777308777
            </a>
            <a href="mailto:info@creativeitinstitute.com" class="sal-animate">
              <img
                src="https://www.creativeitinstitute.com/assets/images/home/top-mail.png"
                alt="email icon"
              />
              info@creativeitinstitute.com
            </a>
          </div>
        </div>
      </section>

      <nav>
        <div class="container">
          <a href="#">
            <img
              src="https://www.creativeitinstitute.com/images/logo/logo1718088965.png"
              style="max-height: 52px"
              alt="Logo"
            />
          </a>

          <div>
            <ul>
              <li>
                <a href="https://www.creativeitinstitute.com" class="nav-link"
                  >Home</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/about-us"
                  class="nav-link"
                  >About us</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/success-story"
                  class="nav-link"
                  >Success story</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/diploma"
                  class="nav-link"
                  >Diploma</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/career"
                  class="nav-link"
                  >Career</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/contact-us"
                  class="nav-link"
                  >Contact</a
                >
              </li>
              <li>
                <a
                  href="https://www.creativeitinstitute.com/our-courses"
                  class="btn-browse"
                >
                  Browse Course
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
