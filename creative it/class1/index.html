<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .container {
        display: flex;
        flex-direction: column;
        width: 800px;
      }

      .row {
        display: flex;
        height: 100px;
      }

      .box {
        border: 1px solid black;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      p {
        padding: 5px 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Row 1 -->
      <div class="row">
        <div class="box" style="flex: 1.5"></div>
        <div class="box" style="flex: 2"></div>
        <div class="box" style="flex: 1.5"></div>
      </div>

      <!-- Row 2 -->
      <div class="row">
        <div class="box" style="flex: 1"></div>
        <div class="box" style="flex: 3">
          <div class="box"><p>CIT EBT WEB 8</p></div>
        </div>
        <div class="box" style="flex: 1"></div>
      </div>

      <!-- Row 3 -->
      <div class="row">
        <div class="box" style="flex: 2"></div>
        <div class="box" style="flex: 3"></div>
        <div class="box" style="flex: 2"></div>
      </div>
    </div>
  </body>
</html>
