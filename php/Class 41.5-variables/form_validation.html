<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="" mathod="post" name="form" onsubmit="return validation();">
      <label for="">Name</label><br />
      <input type="text" name="name" /><br /><br />

      <label for="">Email</label><br />
      <input type="text" name="email" /><br /><br />

      <label for="">Password</label><br />
      <input type="text" name="password" /><br /><br />

      <input type="submit" name="" value="submit" id="" />
      <input type="reset" name="" value="reset" id="" />
    </form>

    <script>
      function validation() {
        let nam = document.form.name.value;
        let eml = document.form.email.value;
        let pass = document.form.password.value;

        if (nam == '') {
          alert('Input your name');
          return false;
        }
        if (eml == '') {
          alert('Input your Emal');
          return false;
        }
        if (eml.indexof('@') == -1 && eml.indexof('.') == -1) {
          alert('Invalid Email');
          return false;
        }
        if (pass.length < 4 || pass.length > 8) {
          alert('Input Password must be 4 to 8 carecter');
          return false;
        }

        let newWindow = window.open('', '', 'width=400,height=300');

        newWindow.document.write(`
        <p>Name: ${nam} </p>
        <p>Email: ${eml} </p>
        <p>Password: ${pass} </p>
        `);
        return false;
      }
    </script>
  </body>
</html>
