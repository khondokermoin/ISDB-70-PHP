<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>

  <body>
    <form id="studentForm" onsubmit="return submitData(event);">
      <label>Name</label><br />
      <input
        type="text"
        name="uname"
        placeholder="Enter your name"
        required
      /><br /><br />

      <label>Email</label><br />
      <input
        type="text"
        name="uemail"
        placeholder="Enter your email"
        required
      /><br /><br />

      <label>Password</label><br />
      <input type="text" name="password" /><br /><br />

      <label>Course:</label>
      <input type="checkbox" name="course[]" value="HTML" /> HTML
      <input type="checkbox" name="course[]" value="JavaScript" /> JavaScript
      <input type="checkbox" name="course[]" value="PHP" /> PHP <br /><br />

      <label>Gender:</label>
      <input type="radio" name="gender" value="Male" /> Male
      <input type="radio" name="gender" value="Female" /> Female <br /><br />

      <label>Department:</label>
      <select name="department">
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="BBA">BBA</option>
      </select>
      <br /><br />

      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>

    <script>
      function submitData(event) {
        event.preventDefault();

        let form = document.getElementById('studentForm');
        let name = form['uname'].value.trim();
        let email = form['uemail'].value.trim();
        let dep = form['department'].value;
        let pass = form['password'].value.trim();

        let courses = document.querySelectorAll(
          'input[name="course[]"]:checked'
        );
        let courseList = Array.from(courses)
          .map(c => c.value)
          .join(', ');

        let gender = document.querySelector('input[name="gender"]:checked');
        let genderValue = gender ? gender.value : '';

        if (name === '') {
          alert('Please enter your name.');
          return false;
        }
        if (email == '') {
          alert('Input your Emal');
          return false;
        }
        if (email.indexOf('@') == -1) {
          alert('Missing @ On Email');
          return;
        }
        if (email.indexOf('.com') == -1) {
          alert('Missing .COM On Email');
          return;
        }

        if (pass === '') {
          alert('Please enter your password.');
          return false;
        }

        if (pass.length < 4 || pass.length >= 8) {
          alert('Enter 4 to 7 digit password');
          return;
        }

        if (courseList === '') {
          alert('Please select at least one course.');
          return false;
        }

        if (genderValue === '') {
          alert('Please select your gender.');
          return false;
        }

        let newWindow = window.open('', '', 'width=400,height=500');

        newWindow.document.write(`
          
            <h2>Submitted Information</h2>
            <p><b>Name:</b> ${name}</p>
            <p><b>Email:</b> ${email}</p>
            <p><b>Password:</b> ${pass}</p>
            <p><b>Course:</b> ${courseList}</p>
            <p><b>Gender:</b> ${genderValue}</p>
            <p><b>Department:</b> ${dep}</p>
          
        `);

        newWindow.document.close();
        return false;
      }
    </script>
  </body>
</html>
